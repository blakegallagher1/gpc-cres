name = "entitlement-os-agent"
main = "src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "agents.gallagherpropco.com/*", zone_id = "ae43d9f313e1eb6f017bb198cd114b33" }
]

[durable_objects]
bindings = [
  { name = "AGENT_CHAT", class_name = "AgentChatDO" },
  { name = "CODEX_RELAY", class_name = "CodexRelayDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentChatDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CodexRelayDO"]

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "ebd13ab7df60414d9ba8244299467e5e"

# Secrets (set via `wrangler secret put`):
# OPENAI_API_KEY
# LOCAL_API_KEY
# LOCAL_API_URL        (e.g. https://api.gallagherpropco.com)
# CF_ACCESS_CLIENT_ID
# CF_ACCESS_CLIENT_SECRET
# VERCEL_URL           (e.g. https://gallagherpropco.com)
# CODEX_APP_SERVER_URL (e.g. ws://codex-gateway-host:8765)
