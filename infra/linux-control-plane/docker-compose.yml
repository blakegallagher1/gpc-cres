services:
  gateway:
    build:
      context: ../local-api
      dockerfile: Dockerfile
    container_name: gpc-gateway-linux
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${WINDOWS_PROPERTY_DB_URL}
      APPLICATION_DATABASE_URL: ${WINDOWS_APP_DB_URL}
      MARTIN_URL: ${WINDOWS_MARTIN_URL}
      API_KEYS: ${API_KEYS}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      QDRANT_URL: ${WINDOWS_QDRANT_URL}
      CUA_WORKER_URL: http://cua-worker:3001
      B2_S3_ENDPOINT_URL: ${B2_S3_ENDPOINT_URL}
      B2_ACCESS_KEY_ID: ${B2_ACCESS_KEY_ID}
      B2_SECRET_ACCESS_KEY: ${B2_SECRET_ACCESS_KEY}
      B2_BUCKET: ${B2_BUCKET}
      B2_REGION: ${B2_REGION}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      cua-worker:
        condition: service_healthy

  cua-worker:
    build:
      context: ../cua-worker
      dockerfile: Dockerfile
    container_name: gpc-cua-worker-linux
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      API_KEY: ${API_KEYS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 3001
      BROWSER_MODE: ${CUA_BROWSER_MODE:-headless}
      DEFAULT_MODEL: ${CUA_DEFAULT_MODEL:-gpt-5.4-mini}
      MAX_TURNS: ${CUA_MAX_TURNS:-24}
      SCREENSHOT_DIR: /tmp/cua-data/screenshots
      GPC_PROD_SITE_ALLOWED_HOSTS: ${GPC_PROD_SITE_ALLOWED_HOSTS}
      GPC_PROD_SITE_LOGIN_PATH: ${GPC_PROD_SITE_LOGIN_PATH:-/login}
      GPC_PROD_SITE_EMAIL: ${GPC_PROD_SITE_EMAIL}
      GPC_PROD_SITE_PASSWORD: ${GPC_PROD_SITE_PASSWORD}
      GPC_PROD_SITE_BOOTSTRAP_TIMEOUT_MS: ${GPC_PROD_SITE_BOOTSTRAP_TIMEOUT_MS:-30000}
    volumes:
      - cua-data:/tmp/cua-data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  cua-data:
