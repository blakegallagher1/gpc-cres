name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from .env.example
        run: cp .env.example .env

      - name: Generate Prisma client
        run: pnpm --filter @entitlement-os/db generate

      - name: Build packages
        run: pnpm --filter @entitlement-os/shared build && pnpm --filter @entitlement-os/db build && pnpm --filter @entitlement-os/evidence build && pnpm --filter @entitlement-os/artifacts build && pnpm --filter @entitlement-os/openai build

      - name: Lint
        run: pnpm --filter gpc-agent-dashboard lint

      - name: Tests
        run: pnpm --filter gpc-agent-dashboard test

      - name: Build
        run: pnpm --filter gpc-agent-dashboard build

  chat-learning-chromium:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: entitlement_os
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d entitlement_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: "true"
      AUTH_SECRET: "test-auth-secret-for-playwright"
      NEXTAUTH_SECRET: "test-auth-secret-for-playwright"
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      DIRECT_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      DATABASE_URL_LOCAL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      DIRECT_DATABASE_URL_LOCAL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      PLAYWRIGHT_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      PLAYWRIGHT_DIRECT_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      PLAYWRIGHT_PORT: "3117"
      PLAYWRIGHT_LOCAL_DEV_AUTH_ORG_ID: "00000000-0000-0000-0000-000000000001"
      # Seed data currently provisions the local owner as ...0002; keep CI E2E aligned.
      PLAYWRIGHT_LOCAL_DEV_AUTH_USER_ID: "00000000-0000-0000-0000-000000000002"
      PLAYWRIGHT_ENABLE_TEMPORAL: "false"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Check required secrets
        id: required-secrets
        run: |
          if [[ -n "$OPENAI_API_KEY" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Create .env from .env.example
        if: steps.required-secrets.outputs.available == 'true'
        run: cp .env.example .env

      - name: Generate Prisma client
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm --filter @entitlement-os/db generate

      - name: Build packages
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm --filter @entitlement-os/shared build && pnpm --filter @entitlement-os/db build && pnpm --filter @entitlement-os/evidence build && pnpm --filter @entitlement-os/artifacts build && pnpm --filter @entitlement-os/openai build

      - name: Migrate database
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm db:migrate

      - name: Seed database
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm db:seed

      - name: Install Chromium for Playwright
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm -C apps/web exec playwright install --with-deps chromium

      - name: Run chat-learning Chromium gate
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm -C apps/web exec playwright test e2e/chat-learning.spec.ts --project chromium --workers=1

      - name: Skip chat-learning Chromium gate (missing secret)
        if: steps.required-secrets.outputs.available != 'true'
        run: echo "::notice::Skipping chat-learning Chromium PR gate because OPENAI_API_KEY is not configured."

      - name: Upload Playwright artifacts
        if: failure() && steps.required-secrets.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: chat-learning-chromium-${{ github.run_id }}
          path: |
            apps/web/playwright-report/**
            apps/web/test-results/**
