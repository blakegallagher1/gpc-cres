name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from .env.example
        run: cp .env.example .env

      - name: Generate Prisma client
        run: pnpm --filter @entitlement-os/db generate

      - name: Build packages (turbo cached)
        run: pnpm exec turbo run build --filter=@entitlement-os/shared --filter=@entitlement-os/db --filter=@entitlement-os/artifacts --filter=@entitlement-os/openai --filter=@entitlement-os/evidence

      - name: Boundary locks
        run: pnpm test:boundaries

      - name: Lint
        run: pnpm --filter gpc-agent-dashboard lint

      - name: Tests with coverage
        run: pnpm --filter gpc-agent-dashboard exec vitest run --coverage --configLoader runner

      - name: Package tests with coverage
        run: pnpm --filter @entitlement-os/openai exec vitest run --coverage && pnpm --filter @entitlement-os/shared exec vitest run --coverage

      - name: Build
        run: pnpm --filter gpc-agent-dashboard build

  e2e-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from .env.example
        run: cp .env.example .env

      - name: Generate Prisma client
        run: pnpm --filter @entitlement-os/db generate

      - name: Build packages (turbo cached)
        run: pnpm exec turbo run build --filter=@entitlement-os/shared --filter=@entitlement-os/db --filter=@entitlement-os/artifacts --filter=@entitlement-os/openai --filter=@entitlement-os/evidence

      - name: Boundary locks
        run: pnpm test:boundaries

      - name: Install Chromium for Playwright
        run: pnpm -C apps/web exec playwright install --with-deps chromium

      - name: Run UI E2E specs (no DB required)
        run: >-
          pnpm -C apps/web exec playwright test
          e2e/agents.spec.ts
          e2e/chat-layout.spec.ts
          e2e/command-center-kpi.spec.ts
          e2e/navigation.spec.ts
          e2e/workflows.spec.ts
          --project chromium --workers=1

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-${{ github.run_id }}
          path: |
            apps/web/playwright-report/**
            apps/web/test-results/**

  e2e-db:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: entitlement_os
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d entitlement_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: "true"
      AUTH_SECRET: "test-auth-secret-for-playwright"
      NEXTAUTH_SECRET: "test-auth-secret-for-playwright"
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      DIRECT_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      DATABASE_URL_LOCAL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      DIRECT_DATABASE_URL_LOCAL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      PLAYWRIGHT_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      PLAYWRIGHT_DIRECT_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/entitlement_os?schema=public"
      PLAYWRIGHT_PORT: "3117"
      PLAYWRIGHT_LOCAL_DEV_AUTH_ORG_ID: "00000000-0000-0000-0000-000000000001"
      # Seed data currently provisions the local owner as ...0002; keep CI E2E aligned.
      PLAYWRIGHT_LOCAL_DEV_AUTH_USER_ID: "00000000-0000-0000-0000-000000000002"
      PLAYWRIGHT_ENABLE_TEMPORAL: "false"
      PLAYWRIGHT_LIVE_DB_E2E: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Check required secrets
        id: required-secrets
        run: |
          if [[ -n "$OPENAI_API_KEY" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Create .env from .env.example
        if: steps.required-secrets.outputs.available == 'true'
        run: cp .env.example .env

      - name: Generate Prisma client
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm --filter @entitlement-os/db generate

      - name: Build packages
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm --filter @entitlement-os/shared build && pnpm --filter @entitlement-os/db build && pnpm --filter @entitlement-os/artifacts build && pnpm --filter @entitlement-os/openai build && pnpm --filter @entitlement-os/evidence build

      - name: Boundary locks
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm test:boundaries

      - name: Migrate database
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm db:migrate

      - name: Seed database
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm db:seed

      - name: Install Chromium for Playwright
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm -C apps/web exec playwright install --with-deps chromium

      - name: Run DB-dependent E2E specs
        if: steps.required-secrets.outputs.available == 'true'
        run: >-
          pnpm -C apps/web exec playwright test
          e2e/admin.spec.ts
          e2e/chat-continuation.spec.ts
          e2e/chat-knowledge-learning.spec.ts
          e2e/chat-learning.spec.ts
          --project chromium --workers=1

      - name: Skip E2E DB specs (missing secret)
        if: steps.required-secrets.outputs.available != 'true'
        run: echo "::notice::Skipping DB-dependent E2E specs because OPENAI_API_KEY is not configured."

      - name: Upload Playwright artifacts
        if: failure() && steps.required-secrets.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-db-${{ github.run_id }}
          path: |
            apps/web/playwright-report/**
            apps/web/test-results/**
