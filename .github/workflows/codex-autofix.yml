name: Codex Autofix

on:
  workflow_run:
    workflows: ["Harness CI — gallagher-cres"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch != 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout failing branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from .env.example
        run: cp .env.example .env

      - name: Generate Prisma client
        run: pnpm --filter @entitlement-os/db generate

      - name: Download CI logs
        uses: actions/github-script@v7
        id: ci-logs
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });
            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            const summaries = failedJobs.map(j => `${j.name}: ${j.conclusion}`).join('\n');
            core.setOutput('failed_jobs', summaries);

      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Run Codex autofix
        id: codex-fix
        run: |
          codex exec \
            --full-auto \
            "$PROMPT" \
            > /tmp/codex-fix-output.log 2>&1 || true

          # Check if codex produced structured output
          if [ -f /tmp/codex-fix-result.json ]; then
            echo "Codex produced structured output"
          else
            echo '{"fixed":false,"summary":"Codex did not produce structured output","files_changed":[],"error_category":"unknown","confidence":"low","requires_human_review":true}' > /tmp/codex-fix-result.json
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROMPT: |
            The CI pipeline failed on this branch. Failed jobs:
            ${{ steps.ci-logs.outputs.failed_jobs }}

            Fix the failures. Run the specific failing commands to reproduce, then fix.
            Common commands: pnpm lint, pnpm typecheck, pnpm test, pnpm build.
            Do NOT change test expectations unless the test itself is wrong.
            Do NOT weaken type checks or lint rules.
            Scope: only fix what's broken, don't refactor.

            After fixing, write your results to /tmp/codex-fix-result.json matching this schema:
            {"fixed": boolean, "summary": string, "files_changed": string[], "error_category": string, "confidence": "high"|"medium"|"low", "requires_human_review": boolean}

      - name: Parse fix result
        id: parse
        run: |
          RESULT_FILE="/tmp/codex-fix-result.json"

          if [ ! -f "$RESULT_FILE" ]; then
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            echo "summary=Codex did not produce output file" >> "$GITHUB_OUTPUT"
            echo "confidence=low" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Validate JSON before parsing
          if ! jq empty "$RESULT_FILE" 2>/dev/null; then
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            echo "summary=Codex output is invalid JSON" >> "$GITHUB_OUTPUT"
            echo "confidence=low" >> "$GITHUB_OUTPUT"
            echo "::warning::Codex produced invalid JSON output"
            cat "$RESULT_FILE" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          FIXED=$(jq -r '.fixed // false' "$RESULT_FILE")
          SUMMARY=$(jq -r '.summary // "No summary"' "$RESULT_FILE")
          CONFIDENCE=$(jq -r '.confidence // "low"' "$RESULT_FILE")

          echo "fixed=$FIXED" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "confidence=$CONFIDENCE" >> "$GITHUB_OUTPUT"

      - name: Create fix PR
        if: steps.parse.outputs.fixed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = `codex/autofix-${context.runNumber}`;
            const { execSync } = require('child_process');
            execSync(`git checkout -b ${branch}`);
            execSync(`git add -A`);
            execSync(`git commit -m "fix(ci): codex autofix — ${process.env.SUMMARY}"`);
            execSync(`git push origin ${branch}`);

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix(ci): codex autofix — ${process.env.SUMMARY}`,
              body: [
                '## Codex Autofix',
                '',
                `**Confidence:** ${process.env.CONFIDENCE}`,
                `**Summary:** ${process.env.SUMMARY}`,
                '',
                `Triggered by CI failure in run #${{ github.event.workflow_run.id }}`,
                '',
                '> Review carefully before merging. Auto-generated by Codex.',
              ].join('\n'),
              head: branch,
              base: '${{ github.event.workflow_run.head_branch }}',
            });
        env:
          SUMMARY: ${{ steps.parse.outputs.summary }}
          CONFIDENCE: ${{ steps.parse.outputs.confidence }}

      - name: Comment on original PR if no fix
        if: steps.parse.outputs.fixed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${{ github.event.workflow_run.head_branch }}`,
              state: 'open',
            });
            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                body: `Codex attempted to autofix CI failure but could not resolve it.\n\n**Summary:** ${process.env.SUMMARY}\n\nManual intervention required.`,
              });
            }
        env:
          SUMMARY: ${{ steps.parse.outputs.summary }}
