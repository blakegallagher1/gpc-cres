name: Codex Issue Fix

# Trigger: add the "codex-fix" label to any issue → Codex analyzes and opens a fix PR.
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  issue-fix:
    if: github.event.label.name == 'codex-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from .env.example
        run: cp .env.example .env

      - name: Generate Prisma client
        run: pnpm --filter @entitlement-os/db generate

      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Run Codex issue fix
        id: codex-fix
        run: |
          codex exec \
            --full-auto \
            "$PROMPT" \
            > /tmp/codex-issue-fix-output.log 2>&1 || true

          if [ ! -f /tmp/codex-issue-fix-result.json ]; then
            echo '{"fixed":false,"summary":"Codex did not produce structured output","confidence":"low"}' \
              > /tmp/codex-issue-fix-result.json
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROMPT: |
            Issue #${{ github.event.issue.number }} has been labeled for an automated fix.

            Title: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

            This is the Entitlement OS project — a commercial real estate platform for
            Gallagher Property Company. Key rules:
            - Scope changes only to what the issue describes — no refactoring
            - All API routes must use resolveAuth() + orgId scoping
            - Zod params use .nullable() not .optional(); no .url()/.email() validators
            - Event dispatch uses .catch(() => {}) — never blocks response
            - Run: pnpm typecheck && pnpm lint before finishing
            - Do NOT commit or push — just stage changes

            Write results to /tmp/codex-issue-fix-result.json:
            {"fixed": boolean, "summary": string, "confidence": "high"|"medium"|"low"}

      - name: Open fix PR or comment failure
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execFileSync } = require('child_process');
            let result = { fixed: false, summary: 'No output produced', confidence: 'low' };
            try {
              result = JSON.parse(fs.readFileSync('/tmp/codex-issue-fix-result.json', 'utf8'));
            } catch {}

            if (!result.fixed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.issue.number }},
                body: `**Codex** analyzed this issue but could not produce an automated fix.\n\n**Summary:** ${result.summary}\n\nManual implementation required.`,
              });
              return;
            }

            const normalizedSummary = String(result.summary ?? 'No output produced')
              .replace(/\s+/g, ' ')
              .trim();
            const commitSummary = normalizedSummary.slice(0, 72) || 'No output produced';
            const prSummary = normalizedSummary.slice(0, 60) || 'No output produced';
            const branch = `codex/issue-${{ github.event.issue.number }}`;
            execFileSync('git', ['config', 'user.name', 'Codex']);
            execFileSync('git', ['config', 'user.email', 'codex@openai.com']);
            execFileSync('git', ['checkout', '-b', branch]);
            execFileSync('git', ['add', '-A']);
            execFileSync('git', ['commit', '-m', `fix: closes #${{ github.event.issue.number }} - ${commitSummary}`]);
            execFileSync('git', ['push', 'origin', branch]);

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix: closes #${{ github.event.issue.number }} - ${prSummary}`,
              body: [
                '## Codex Auto-Fix',
                '',
                `Closes #${{ github.event.issue.number }}`,
                '',
                `**Confidence:** ${result.confidence}`,
                `**Summary:** ${result.summary}`,
                '',
                '> Auto-generated by Codex. Review carefully before merging.',
              ].join('\n'),
              head: branch,
              base: 'main',
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `**Codex** opened PR #${pr.data.number} with a proposed fix: ${pr.data.html_url}`,
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
