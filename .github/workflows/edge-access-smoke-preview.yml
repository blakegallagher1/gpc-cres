name: Edge Access Smoke (Preview)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  edge-access-smoke:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      LOCAL_API_URL: https://api.gallagherpropco.com
      LOCAL_API_KEY: ${{ secrets.LOCAL_API_KEY }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Validate required secrets
        run: |
          test -n "$LOCAL_API_KEY" || (echo "Missing secret LOCAL_API_KEY" && exit 1)
          test -n "$CF_ACCESS_CLIENT_ID" || (echo "Missing secret CF_ACCESS_CLIENT_ID" && exit 1)
          test -n "$CF_ACCESS_CLIENT_SECRET" || (echo "Missing secret CF_ACCESS_CLIENT_SECRET" && exit 1)

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run edge smoke matrix
        run: pnpm smoke:gateway:edge-access
