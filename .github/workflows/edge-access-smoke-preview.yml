name: Edge Access Smoke (Preview)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  edge-access-smoke:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      LOCAL_API_URL: https://api.gallagherpropco.com
      LOCAL_API_KEY: ${{ secrets.LOCAL_API_KEY }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Check required secrets
        id: required-secrets
        run: |
          if [[ -n "$LOCAL_API_KEY" && -n "$CF_ACCESS_CLIENT_ID" && -n "$CF_ACCESS_CLIENT_SECRET" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run edge smoke matrix
        if: steps.required-secrets.outputs.available == 'true'
        run: pnpm smoke:gateway:edge-access

      - name: Skip smoke (missing secrets)
        if: steps.required-secrets.outputs.available != 'true'
        run: echo "::notice::Skipping edge smoke because one or more required secrets are not configured."
