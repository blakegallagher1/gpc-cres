name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from .env.example
        run: cp .env.example .env

      - name: Generate Prisma client
        run: pnpm --filter @entitlement-os/db generate

      - name: Get diff
        id: diff
        run: |
          DIFF=$(git diff origin/main...HEAD --stat)
          echo "diff_stat<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Run Codex review
        id: codex-review
        run: |
          codex exec \
            --full-auto \
            "$PROMPT" \
            > /tmp/codex-review-output.log 2>&1 || true

          # Ensure structured output exists
          if [ ! -f /tmp/codex-review.json ]; then
            echo '{"verdict":"comment","summary":"Codex review did not produce structured output.","issues":[],"security_concerns":false,"org_scoping_verified":false,"test_coverage_adequate":false}' > /tmp/codex-review.json
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROMPT: |
            Review this pull request for the Entitlement OS project (commercial real estate platform).

            Changed files:
            ${{ steps.diff.outputs.diff_stat }}

            Review checklist:
            1. Security: All API routes use resolveAuth() + orgId scoping?
            2. No client-side secrets (NEXT_PUBLIC_ prefix on server-only vars)?
            3. Zod schemas use .nullable() not .optional() for OpenAI tool params?
            4. No .url() or .email() Zod validators (OpenAI rejects format constraints)?
            5. Event dispatch uses .catch(() => {}) — never blocks response?
            6. No weakening of existing type checks or test assertions?
            7. Test coverage for new code paths?

            Be concise. Only flag real issues, not style preferences.

            Write your results to /tmp/codex-review.json matching this schema:
            {"verdict": "approve"|"request_changes"|"comment", "summary": string, "issues": [{"severity": "critical"|"warning"|"info", "file": string, "line": number|null, "message": string, "suggestion": string|null}], "security_concerns": boolean, "org_scoping_verified": boolean, "test_coverage_adequate": boolean}

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review;
            try {
              const raw = fs.readFileSync('/tmp/codex-review.json', 'utf8');
              review = JSON.parse(raw);
            } catch {
              review = { verdict: 'comment', summary: 'Codex review did not produce structured output.', issues: [], security_concerns: false, org_scoping_verified: false, test_coverage_adequate: false };
            }

            const issueLines = (review.issues || []).map(i => {
              const loc = i.line ? `${i.file}:${i.line}` : i.file;
              const icon = i.severity === 'critical' ? 'X' : i.severity === 'warning' ? '!' : '-';
              return `- [${icon}] **${i.severity}** \`${loc}\`: ${i.message}`;
            }).join('\n');

            const body = [
              '## Codex Review',
              '',
              `**Verdict:** ${review.verdict}`,
              `**Security concerns:** ${review.security_concerns ? 'YES' : 'None'}`,
              `**Org-scoping verified:** ${review.org_scoping_verified ? 'Yes' : 'Not verified'}`,
              `**Test coverage:** ${review.test_coverage_adequate ? 'Adequate' : 'Gaps found'}`,
              '',
              review.summary,
              '',
              (review.issues || []).length > 0 ? '### Issues\n' + issueLines : 'No issues found.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
