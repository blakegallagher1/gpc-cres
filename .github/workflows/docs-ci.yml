name: Docs CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Validate documentation headers, archive banners, and index links
        run: node scripts/testing/validate-docs.mjs
