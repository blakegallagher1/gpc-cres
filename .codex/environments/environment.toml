# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "gallagher-cres"

[setup]
script = """
# Ensure gh CLI is available
if ! command -v gh &> /dev/null; then
  echo "Installing GitHub CLI..."
  if command -v brew &> /dev/null; then
    brew install gh
  elif command -v apt-get &> /dev/null; then
    (type -p wget >/dev/null || sudo apt-get install wget -y) && \
    sudo mkdir -p -m 755 /etc/apt/keyrings && \
    out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg && \
    cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null && \
    sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg && \
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null && \
    sudo apt-get update && sudo apt-get install gh -y
  fi
fi

# Verify gh auth
if command -v gh &> /dev/null; then
  gh auth status 2>/dev/null || echo "WARNING: gh CLI not authenticated. Set GH_TOKEN env var."
fi

# Verify pnpm available
if ! command -v pnpm &> /dev/null; then
  npm install -g pnpm
fi

# Install monorepo dependencies
pnpm install --frozen-lockfile 2>/dev/null || pnpm install

# Create env file from example (required for Prisma generate + builds)
if [ ! -f .env ]; then
  cp .env.example .env
  echo "Created .env from .env.example — populate secrets before running tests."
fi

# Generate Prisma client (required before any build or typecheck)
pnpm --filter @entitlement-os/db generate
"""

[[actions]]
name = "Dev"
icon = "run"
command = "pnpm dev"

[[actions]]
name = "Build"
icon = "build"
command = "pnpm build"

[[actions]]
name = "Test"
icon = "test"
command = "pnpm test"

[[actions]]
name = "Lint"
icon = "check"
command = "pnpm lint && pnpm typecheck"

[[actions]]
name = "Run"
icon = "run"
command = "./script/build_and_run.sh"

[[actions]]
name = "Deploy Fast"
icon = "deploy"
command = "pnpm deploy:fast"

[[actions]]
name = "Deploy Full"
icon = "deploy"
command = "pnpm deploy"

[[actions]]
name = "Deploy CF Worker"
icon = "deploy"
command = "cd infra/gateway-proxy && npx wrangler deploy"

[[actions]]
