#:schema https://developers.openai.com/codex/config-schema.json

# ~/.codex/config.toml — User-level Codex config for Blake @ GPC
# Install: mkdir -p ~/.codex && cp .codex/global-config-install.toml ~/.codex/config.toml
#
# Sets global defaults across all repos.
# Project-level .codex/config.toml overrides these per-repo.
# Last updated: 2026-04-20

# ---------------------------------------------------------------------------
# Core
# ---------------------------------------------------------------------------
model                   = "gpt-5.4"
personality             = "pragmatic"
approval_policy         = "on-request"
approvals_reviewer      = "guardian_subagent"
sandbox_mode            = "workspace-write"
file_opener             = "cursor"

model_reasoning_effort  = "xhigh"
model_reasoning_summary = "concise"
model_verbosity         = "medium"
model_context_window    = 1000000
model_auto_compact_token_limit = 950000

plan_mode_reasoning_effort = "high"
review_model            = "gpt-5.4"

web_search              = "live"
service_tier            = "fast"

background_terminal_max_timeout = 600000
check_for_update_on_startup     = true
hide_agent_reasoning            = false
show_raw_agent_reasoning        = false
suppress_unstable_features_warning = true

project_doc_max_bytes              = 524288
project_doc_fallback_filenames     = ["AGENTS.md", "CLAUDE.md", ".agents.md"]
tool_output_token_limit            = 200000

cli_auth_credentials_store     = "keyring"
mcp_oauth_callback_port        = 4591
mcp_oauth_credentials_store    = "keyring"

commit_attribution = "Co-Authored-By: Codex <codex@openai.com>"
zsh_path           = "/bin/zsh"

# ---------------------------------------------------------------------------
# Agents
# ---------------------------------------------------------------------------
[agents]
job_max_runtime_seconds = 3600
max_depth               = 4
max_threads             = 8

# ---------------------------------------------------------------------------
# Analytics
# ---------------------------------------------------------------------------
[analytics]
enabled = false

# ---------------------------------------------------------------------------
# Apps
# ---------------------------------------------------------------------------
[apps._default]
destructive_enabled = true
enabled             = true
open_world_enabled  = true

# ---------------------------------------------------------------------------
# Sandbox
# ---------------------------------------------------------------------------
[sandbox_workspace_write]
network_access = true

# ---------------------------------------------------------------------------
# Shell Environment
# ---------------------------------------------------------------------------
[shell_environment_policy]
inherit                = "all"
experimental_use_profile = true
ignore_default_excludes  = true

# ---------------------------------------------------------------------------
# Features — all stable + experimental as of 2026-04-20
# ---------------------------------------------------------------------------
[features]
apply_patch_freeform            = true
apps                            = true
artifact                        = true
child_agents_md                 = true
code_mode                       = true
codex_git_commit                = true
codex_hooks                     = true
default_mode_request_user_input = true
enable_fanout                   = true
enable_request_compression      = true
exec_permission_approvals       = true
fast_mode                       = true
guardian_approval                = true
image_detail_original           = true
image_generation                = true
js_repl                         = true
memories                        = true
multi_agent                     = true
multi_agent_v2                  = true
personality                     = true
plugins                         = true
prevent_idle_sleep              = true
realtime_conversation           = true
request_permissions_tool        = true
runtime_metrics                 = true
shell_snapshot                  = true
shell_tool                      = true
shell_zsh_fork                  = true
skill_env_var_dependency_prompt = true
skill_mcp_dependency_install    = true
smart_approvals                 = true
tool_call_mcp_elicitation       = true
tool_search                     = true
tool_suggest                    = true
undo                            = true
unified_exec                    = true
voice_transcription             = true

# ---------------------------------------------------------------------------
# History & Memory
# ---------------------------------------------------------------------------
[history]
persistence = "save-all"

[memories]
generate_memories = true

# ---------------------------------------------------------------------------
# Notice
# ---------------------------------------------------------------------------
[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

# ---------------------------------------------------------------------------
# Realtime (voice)
# ---------------------------------------------------------------------------
[realtime]
session_type = "conversational"
transport    = "webrtc"
version      = "v2"

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------
[tools]
view_image = true

[tools.web_search]
context_size = "high"

# ---------------------------------------------------------------------------
# TUI
# ---------------------------------------------------------------------------
[tui]
alternate_screen    = "auto"
animations          = true
notification_method = "auto"
notifications       = true
show_tooltips       = true

# ---------------------------------------------------------------------------
# Plugins — enable all curated + bundled
# ---------------------------------------------------------------------------
[plugins."build-ios-apps@openai-curated"]
enabled = true

[plugins."build-macos-apps@openai-curated"]
enabled = true

[plugins."build-web-apps@openai-curated"]
enabled = true

[plugins."canva@openai-curated"]
enabled = true

[plugins."circleci@openai-curated"]
enabled = true

[plugins."cloudflare@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."figma@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = true

[plugins."hugging-face@openai-curated"]
enabled = true

[plugins."jam@openai-curated"]
enabled = true

[plugins."netlify@openai-curated"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."vercel@openai-curated"]
enabled = true

# ---------------------------------------------------------------------------
# Trusted Projects — add your repos here
# ---------------------------------------------------------------------------
[projects."/Users/gallagherpropertycompany/Documents/gallagher-cres"]
trust_level = "trusted"
