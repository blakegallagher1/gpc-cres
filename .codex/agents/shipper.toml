4. If on a feature branch and merge requested, use: ~/.codex/bin/gship
5. Verify the commit landed on origin/main.
6. Wait 30-60 seconds, then verify Vercel deployment is live and healthy.
7. Report: commit hash, push status, deployment URL, HTTP status.

