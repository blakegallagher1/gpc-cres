#:schema https://developers.openai.com/codex/config-schema.json

# Project-level Codex configuration for Entitlement OS
# OPTIMIZED 2026-03-30: reduced context bloat, faster execution

# ---------------------------------------------------------------------------
# Core Model & Reasoning
# ---------------------------------------------------------------------------
model                   = "gpt-5.5"
personality             = "pragmatic"
approval_policy         = "never"
sandbox_mode            = "danger-full-access"

# HIGH not XHIGH — xhigh causes analysis paralysis on implementation tasks.
# Use the "review" profile for deep analysis when needed.
model_reasoning_effort  = "high"
model_reasoning_summary = "concise"
model_supports_reasoning_summaries = true

# LOW verbosity — enforces terse output at the API level, saving tokens for code.
# AGENTS.md already instructs brevity; this makes it structural.
model_verbosity         = "low"

# MEDIUM for plan mode — faster iteration on approach; implementation stays HIGH.
plan_mode_reasoning_effort = "medium"

# Fast service tier — routes to low-latency path when available on gpt-5.4.
service_tier            = "fast"

web_search = "live"

# 10 min poll timeout — default 5 min is too short for builds and Playwright runs.
background_terminal_max_timeout = 600000

# ---------------------------------------------------------------------------
# Shell Environment Policy
# ---------------------------------------------------------------------------
[shell_environment_policy]
inherit                = "core"
ignore_default_excludes = true
include_only = [
  # System
  "PATH", "HOME", "SHELL", "USER", "LANG", "TERM",
  "NODE_OPTIONS", "EDITOR", "SSH_AUTH_SOCK",
  # Git
  "GH_TOKEN", "GITHUB_TOKEN",
  "GIT_AUTHOR_NAME", "GIT_AUTHOR_EMAIL",
  "GIT_COMMITTER_NAME", "GIT_COMMITTER_EMAIL",
  # Database
  "DATABASE_URL", "DIRECT_URL",
  "READ_REPLICA_DATABASE_URL", "ENABLE_READ_REPLICA",
  "DATABASE_URL_LOCAL", "DIRECT_DATABASE_URL_LOCAL",
  # Auth
  "NEXTAUTH_SECRET", "AUTH_SECRET",
  "ADMIN_API_KEY", "LOCAL_API_KEY",
  # AI / Model routing
  "OPENAI_API_KEY",
  "OPENAI_PARISH_PACK_MODEL", "OPENAI_TRIAGE_MODEL", "OPENAI_ARTIFACT_MODEL",
  "PERPLEXITY_API_KEY",
  # Gateway proxy (canonical Vercel pattern)
  "GATEWAY_PROXY_URL", "GATEWAY_PROXY_TOKEN",
  "GATEWAY_ADMIN_TOKEN", "GATEWAY_SERVICE_USER_ID",
  # Cloudflare
  "CF_ACCESS_CLIENT_ID", "CF_ACCESS_CLIENT_SECRET",
  # CUA browser agent
  "CUA_WORKER_URL",
  # External services
  "GOOGLE_MAPS_API_KEY",
  "NEPTUNE_FLOOD_API_KEY", "NEPTUNE_FLOOD_BASE_URL",
  "SOCRATA_APP_TOKEN",
  # Observability
  "SENTRY_AUTH_TOKEN", "SENTRY_ORG", "SENTRY_PROJECT",
  "SENTRY_DSN", "NEXT_PUBLIC_SENTRY_DSN",
]

# ---------------------------------------------------------------------------
# Feature Flags
# ---------------------------------------------------------------------------
[features]
apply_patch_freeform            = true
apps                            = true
artifact                        = true
child_agents_md                 = true
code_mode                       = true
codex_git_commit                = true
codex_hooks                     = true
default_mode_request_user_input = true
enable_fanout                   = true
enable_request_compression      = true
exec_permission_approvals       = true
fast_mode                       = true
guardian_approval                = true
image_detail_original           = true
image_generation                = true
js_repl                         = true
memories                        = true
multi_agent                     = true
multi_agent_v2                  = true
personality                     = true
plugins                         = true
prevent_idle_sleep              = true
realtime_conversation           = true
request_permissions_tool        = true
runtime_metrics                 = true
shell_snapshot                  = true
shell_tool                      = true
shell_zsh_fork                  = true
skill_env_var_dependency_prompt = true
skill_mcp_dependency_install    = true
smart_approvals                 = true
tool_call_mcp_elicitation       = true
tool_search                     = true
tool_suggest                    = true
undo                            = true
unified_exec                    = true
voice_transcription             = true

# ---------------------------------------------------------------------------
# Multi-agent — trimmed to essentials
# ---------------------------------------------------------------------------
[agents]
max_depth                = 2
job_max_runtime_seconds  = 900     # 15 min — down from 30

[agents.explorer]
description = "Fast read-only codebase exploration. Architecture questions, grep, dependency tracing."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Find security, correctness, org-scoping, and test gaps in code."
config_file = "agents/reviewer.toml"

# ---------------------------------------------------------------------------
# TUI, History & Notifications
# ---------------------------------------------------------------------------
notify = ["python3", ".codex/scripts/notify.py"]

[tui]
notifications = true

[history]
persistence = "save-all"
max_bytes   = 104857600       # 100 MiB cap — oldest-first eviction prevents unbounded growth

# ---------------------------------------------------------------------------
# Profiles
# ---------------------------------------------------------------------------

# Default: fast implementation
[profiles.feature]
approval_policy         = "never"
sandbox_mode            = "danger-full-access"
model_reasoning_effort  = "high"
model_reasoning_summary = "concise"
personality             = "pragmatic"
web_search              = "live"
[profiles.feature.features]
multi_agent = true
memories    = true

# Bug fixes: focused, moderate reasoning
[profiles.bugfix]
approval_policy         = "never"
sandbox_mode            = "danger-full-access"
model_reasoning_effort  = "medium"
model_reasoning_summary = "concise"
personality             = "pragmatic"
[profiles.bugfix.features]
memories = true

# Deep review: max reasoning, read-only
[profiles.review]
approval_policy         = "on-request"
sandbox_mode            = "read-only"
model                   = "gpt-5.5"
model_reasoning_effort  = "xhigh"
model_reasoning_summary = "detailed"
web_search              = "cached"
[profiles.review.features]
memories    = true
multi_agent = true

# ---------------------------------------------------------------------------
# Skills — only the ones that matter for daily work
# ---------------------------------------------------------------------------
[[skills.config]]
path = ".codex/skills/playwright"
enabled = true

[[skills.config]]
path = ".codex/skills/sentry"
enabled = true

[[skills.config]]
path = ".codex/skills/type-hardening"
enabled = true

[[skills.config]]
path = ".codex/skills/ci-fix"
enabled = true

[[skills.config]]
path = ".codex/skills/pr-review"
enabled = true

[[skills.config]]
path = ".codex/skills/dispatch"
enabled = true

[[skills.config]]
path = ".codex/skills/orchestrate"
enabled = true

[[skills.config]]
path = ".codex/skills/frontend-design"
enabled = true

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
[plugins."build-web-apps@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------
[tools]
view_image = true

[tools.web_search]
context_size = "high"
